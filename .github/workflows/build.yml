name: 自动构建动态日志放行模块

# 触发条件：推送到 main 分支、创建 Tag、手动触发
on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch: # 支持手动触发构建

# 运行环境：使用 Ubuntu 最新版
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出仓库代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 2. 配置 Android 环境与 NDK
      - name: 设置 Android NDK 环境
        uses: android-actions/setup-android@v3
        with:
          # 指定 NDK 版本，这里选择兼容 android-21 的稳定版本
          ndk-version: 25.2.9519653

      # 3. 创建构建目录，准备模块结构
      - name: 准备构建目录
        run: |
          # 创建模块目录结构
          mkdir -p build/system/lib64
          # 复制模块配置文件和安装脚本
          cp module.prop build/
          cp custom_install.sh build/
          # 给安装脚本添加可执行权限
          chmod +x build/custom_install.sh

      # 4. 交叉编译 logfilter 共享库
      - name: 编译日志过滤库
        run: |
          # 获取 NDK 编译器路径，执行交叉编译
          $ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang \
            src/logfilter.c \
            -o build/system/lib64/liblogfilter.so \
            -shared -fPIC -ldl -s

      # 5. 打包为 Magisk 模块 Zip 包
      - name: 打包 Magisk 模块
        run: |
          cd build
          # 打包所有模块文件，注意：直接打包目录内文件，不要嵌套父目录
          zip -r ../DynamicLogFilter-v1.0.zip .

      # 6. 上传构建产物，方便下载
      - name: 上传模块包
        uses: actions/upload-artifact@v4
        with:
          name: DynamicLogFilter-Magisk-Module
          path: DynamicLogFilter-v1.0.zip

      # 可选：如果打 Tag，自动发布到 GitHub Release
      - name: 发布到 Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: DynamicLogFilter-v1.0.zip
          name: 动态日志放行模块 v1.0
          draft: false
          prerelease: false
